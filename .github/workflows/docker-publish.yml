name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. 先交叉编译所有平台的二进制文件
  cross-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build frontend
        run: |
          npm install -g pnpm
          pnpm install --no-frozen-lockfile --dir web \
            --config.onlyBuiltDependencies='["esbuild","vue-demi"]'
          pnpm --dir web build

      - name: Cross-compile all binaries
        run: |
          set -e
          mkdir -p release

          export GOPROXY=https://goproxy.cn,direct
          LDFLAGS="-s -w"

          for target in "linux/amd64" "linux/arm64" "linux/loong64" "windows/amd64" "darwin/amd64" "darwin/arm64"; do
            IFS='/' read -r os arch <<< "$target"
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            name="cangjie-mem-$os-$arch$ext"

            echo "=== $os/$arch ==="
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o "release/$name" ./cmd/server
          done

          echo "=== All binaries ==="
          ls -lh release/

      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: release/*
          retention-days: 1

  # 2. Docker 镜像（直接拷贝编译好的二进制，无需 QEMU）
  docker:
    needs: cross-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        platform:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: loong64

    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: release/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cross
          platforms: ${{ matrix.platform.os }}/${{ matrix.platform.arch }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TARGETOS=${{ matrix.platform.os }}
            TARGETARCH=${{ matrix.platform.arch }}

  # 3. 发布 Release
  release:
    needs: [cross-build, docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: release/

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Package binaries
        run: |
          set -e
          cd release

          # Linux
          tar czf cangjie-mem-linux-amd64.tar.gz cangjie-mem-linux-amd64
          tar czf cangjie-mem-linux-arm64.tar.gz cangjie-mem-linux-arm64
          tar czf cangjie-mem-linux-loong64.tar.gz cangjie-mem-linux-loong64

          # Windows
          tar czf cangjie-mem-windows-amd64.tar.gz cangjie-mem-windows-amd64.exe

          # macOS
          tar czf cangjie-mem-darwin-amd64.tar.gz cangjie-mem-darwin-amd64
          tar czf cangjie-mem-darwin-arm64.tar.gz cangjie-mem-darwin-arm64

          # 清理未打包的文件
          rm -f cangjie-mem-linux-amd64 cangjie-mem-linux-arm64 cangjie-mem-linux-loong64
          rm -f cangjie-mem-windows-amd64.exe
          rm -f cangjie-mem-darwin-amd64 cangjie-mem-darwin-arm64

          ls -lh

      - name: Create Release and upload binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ env.VERSION }}"

          gh release create "$VERSION" \
            --title "cangjie-mem $VERSION" \
            --notes "## cangjie-mem $VERSION

          ### 功能特性
          - **Streamable HTTP 模式**：支持远程访问 MCP 服务器
          - **Token 认证**：简单有效的访问控制
          - **多平台支持**：Linux (amd64/arm64/loong64) / Windows / macOS
          - **Docker 部署**：支持多平台（amd64/arm64/loong64）
          - **三级记忆模型**：language/project/library
          - **智能检索**：自动层级判断和置信度评分
          - **纯 Go SQLite**：无需 CGO，基于 modernc.org/sqlite

          ### Docker 镜像

          \`\`\`bash
          docker pull ghcr.io/ystyle/cangjie-mem:$VERSION

          docker run -d --name cangjie-mem -p 8080:8080 ghcr.io/ystyle/cangjie-mem:$VERSION

          docker run -d --name cangjie-mem -p 8080:8080 ghcr.io/ystyle/cangjie-mem:$VERSION \\
            -http -addr :8080 -token \"your-secret-token\"
          \`\`\`

          ### 二进制文件

          **Linux**：
          - \`cangjie-mem-linux-amd64.tar.gz\` - x86_64
          - \`cangjie-mem-linux-arm64.tar.gz\` - ARM64
          - \`cangjie-mem-linux-loong64.tar.gz\` - LoongArch64（龙芯）

          **Windows**：
          - \`cangjie-mem-windows-amd64.tar.gz\` - x86_64

          **macOS**：
          - \`cangjie-mem-darwin-amd64.tar.gz\` - Intel
          - \`cangjie-mem-darwin-arm64.tar.gz\` - Apple Silicon

          详细使用说明请查看 [README](https://github.com/ystyle/cangjie-mem)
          " || true

          for binary in release/*.tar.gz; do
            echo "Uploading $binary..."
            gh release upload "$VERSION" "$binary"
          done
